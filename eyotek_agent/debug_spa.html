    <script type="text/javascript">
        function onTurnstileSuccess(token) {
            $('#turnstileToken').val(token);
            $('#btnLogin').prop('disabled', false);
        }

        jQuery(document).ready(function () {
            Metronic.init();
            Layout.init();

            if ("Production" == "Production") {
                $('#btnLogin').prop('disabled', true);
            }

            $('#btnLogin').click(function () {
                var username = $('#txtUsername').val();
                var password = $('#txtPassword').val();
                if (username != '' & password != '') {
                    $('.alert-danger').addClass('display-hide');
                    $('.bounce-loader').show();
                    $('#BtnSubmit').trigger('click');
                }
                else {
                    $('.alert-danger').removeClass('display-hide');
                    if ($('#txtUsername').val() === '')
                        $('#txtUsername').parent().addClass('has-error');
                    if ($('#txtPassword').val() === '')
                        $('#txtPassword').parent().addClass('has-error');
                    show();
                }
            });

            $('#pnlEnabled .form-control').keypress(function (e) {
                if (e.which == 13) {
                    if ($('#turnstileToken').val() != "" || "Production" == "Development") {
                        $('#btnLogin').trigger('click');
                        return false;
                    }
                }
            });

            $('#txtUsername').focus();

            $('#txtUsername').blur(function () {
                if ($('#txtUsername').val() === '') {
                    $(this).parent().addClass('has-error');
                }
                else if ($('#txtPassword').val() === '') {
                    $(this).parent().removeClass('has-error');
                }
                else {
                    $('.alert-danger').addClass('display-hide');
                    $(this).parent().removeClass('has-error');
                }
            });

            $('#txtPassword').blur(function () {
                if ($('#txtPassword').val() === '') {
                    $(this).parent().addClass('has-error');
                }
                else if ($('#txtUsername').val() === '') {
                    $(this).parent().removeClass('has-error');
                }
                else {
                    $('.alert-danger').addClass('display-hide');
                    $(this).parent().removeClass('has-error');
                }
            });
        });

        function show() {
            $('.alert-danger').show();
            $('.alert-danger').find('span').text('Kullanıcı adı veya şifre boş olamaz.');
        }

        function show(error) {
            $('.alert-danger').show();
            $('.alert-danger').find('span').text(error);
        }

        function hide() {
            $('.alert-danger').hide();
        }
    </script>
