[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    registry: Registry pattern match ve dispatcher testleri
    fast: Fast response handler testleri
    ayt: AYT tool ve fast response testleri
    db: PostgreSQL erisimi gerektiren testler (canli DB ile)
    slow: Yavas testler (gecis gerektiren)
filterwarnings =
    ignore::DeprecationWarning
