<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FermatAI Satranç</title>
<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
    background: #0F172A;
    color: #E2E8F0;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    overflow: hidden;
}
.wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    height: 100vh;
}
/* Tekken/Street Fighter VS başlığı — 25.46+ Neo direktif */
.vs-banner {
    background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 12px 14px;
    text-align: center;
    position: relative;
    overflow: hidden;
}
.vs-banner::before, .vs-banner::after {
    content: '';
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 30%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(245,158,11,0.4), transparent);
}
.vs-banner::before { left: 0; }
.vs-banner::after { right: 0; transform: translateY(-50%) scaleX(-1); }
.vs-row {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-size: 17px; font-weight: 900; letter-spacing: 1px;
    line-height: 1;
}
.fighter-fermat {
    background: linear-gradient(135deg, #F59E0B 0%, #FCD34D 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(245,158,11,0.3);
    font-family: -apple-system, Impact, 'Bebas Neue', sans-serif;
    text-transform: uppercase;
}
.fighter-player {
    color: #E2E8F0;
    text-shadow: 0 0 10px rgba(226,232,240,0.2);
    font-family: -apple-system, Impact, 'Bebas Neue', sans-serif;
    text-transform: uppercase;
}
.vs-text {
    font-size: 13px; font-weight: 900;
    color: #EF4444; text-shadow: 0 0 8px rgba(239,68,68,0.6);
    font-style: italic;
    letter-spacing: 0;
}
.status-row {
    margin-top: 6px;
    font-size: 11px; color: #94A3B8;
    font-weight: 500;
    min-height: 14px;
}
.status-row.thinking { color: #F59E0B; }
.status-row.win { color: #10B981; font-weight: 700; }
.status-row.lose { color: #EF4444; font-weight: 700; }
@media (max-width: 420px) {
    .vs-row { font-size: 15px; gap: 8px; }
    .vs-text { font-size: 11px; }
    .status-row { font-size: 10px; }
}
.status.thinking { color: #F59E0B; }
.status.win { color: #10B981; }
.status.lose { color: #EF4444; }
#board {
    width: 100% !important;
    flex: 1;
    border-radius: 8px;
    overflow: hidden;
    min-height: 320px;
}
.btns { display: flex; gap: 6px; }
.btn {
    flex: 1;
    padding: 9px;
    border: 1px solid #334155;
    background: #1E293B;
    color: #E2E8F0;
    font-size: 12px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    -webkit-appearance: none;
}
.btn:active { transform: scale(0.96); background: #334155; }
.btn.primary {
    background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
    color: #0F172A;
    border-color: transparent;
}
.white-1e1d7 { background: #F8FAFC !important; }
.black-3c85d { background: #475569 !important; }
.highlight-square { box-shadow: inset 0 0 0 3px rgba(245,158,11,0.7) !important; }

/* 25.46+ (Neo 18 May): Esir taş paneli — tahta altı, butonlar üstü.
   "Hangi taşlar kaybedildi" zihinden takip yerine görsel + material
   balance (+N/-N) ipucu. Mevcut palet (slate/amber) korundu, çok kompakt. */
.captured {
    background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 6px 10px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    font-size: 11px;
    color: #94A3B8;
}
.captured-row {
    display: flex;
    align-items: center;
    gap: 6px;
    min-height: 22px;
}
.captured-label {
    font-weight: 600;
    color: #64748B;
    min-width: 78px;
    flex-shrink: 0;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
}
.captured-pieces {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    align-items: center;
    flex: 1;
}
.captured-pieces img {
    width: 26px;
    height: 26px;
    margin-left: -4px;  /* hafif overlap — kompakt ama net */
    /* Kontrast: koyu zeminde hem beyaz hem siyah taş net gözüksün diye
       outer glow + drop shadow. Beyaz tas zaten goz aliyor, siyah icin
       hafif sari halo (amber palet ile uyumlu). */
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5))
            drop-shadow(0 0 2px rgba(245,158,11,0.25));
    transition: transform 0.15s;
}
.captured-pieces img:first-child { margin-left: 0; }
.captured-pieces img:hover {
    transform: translateY(-2px) scale(1.15);
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.6))
            drop-shadow(0 0 4px rgba(245,158,11,0.5));
    z-index: 2;
}
/* 25.46+ Unicode glyph fallback (CDN duser ise) */
.captured-glyph {
    font-size: 24px;
    line-height: 1;
    margin-left: -3px;
    display: inline-block;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    filter: drop-shadow(0 0 2px rgba(245,158,11,0.3));
}
.captured-glyph:first-child { margin-left: 0; }
.captured-glyph.glyph-w { color: #F8FAFC; }  /* beyaz taş */
.captured-glyph.glyph-b { color: #1E293B; -webkit-text-stroke: 1px #94A3B8; }  /* siyah taş — koyu zeminde gorunsun diye outline */
@media (min-width: 700px) {
    .captured-glyph { font-size: 30px; margin-left: -5px; }
}
@media (max-width: 420px) {
    .captured-glyph { font-size: 20px; margin-left: -2px; }
}
.captured-empty {
    color: #475569;
    font-style: italic;
    font-size: 10px;
}
.captured-balance {
    margin-left: auto;
    padding: 3px 9px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 10px;
    flex-shrink: 0;
    background: rgba(100,116,139,0.15);
    color: #94A3B8;
    cursor: help;
    white-space: nowrap;
    letter-spacing: 0.2px;
}
.captured-balance.lead {
    background: rgba(16,185,129,0.18);
    color: #10B981;
}
.captured-balance.behind {
    background: rgba(239,68,68,0.18);
    color: #EF4444;
}
/* 25.46+ Puanlama legend — mini hint avam oyuncuya */
.captured-legend {
    font-size: 9px;
    color: #475569;
    text-align: center;
    padding-top: 4px;
    border-top: 1px dashed #334155;
    margin-top: 2px;
    letter-spacing: 0.2px;
    font-style: italic;
}
.captured-legend strong { color: #64748B; font-weight: 600; font-style: normal; }
@media (max-width: 420px) {
    .captured-legend { font-size: 8px; }
}
@media (max-width: 420px) {
    .captured-label { min-width: 64px; font-size: 9px; }
    .captured-pieces img { width: 20px; height: 20px; margin-left: -3px; }
    .captured { padding: 5px 8px; }
    .captured-row { min-height: 26px; }
}
@media (min-width: 700px) {
    /* Geniş chat overlay'de daha sergileyici boyut */
    .captured-pieces img { width: 30px; height: 30px; margin-left: -5px; }
    .captured-row { min-height: 34px; }
    .captured { padding: 8px 12px; }
}
</style>
</head>
<body>
<div class="wrap">
    <div class="vs-banner">
        <div class="vs-row">
            <span class="fighter-fermat">FERMATAI</span>
            <span class="vs-text">VS</span>
            <span class="fighter-player" id="player-name">SEN</span>
        </div>
        <div class="status-row" id="status">Hazırlanıyor...</div>
    </div>
    <div id="board"></div>
    <!-- 25.46+ (Neo 18 May): Esir taş paneli — tahta altı kompakt görsel takip -->
    <div class="captured" id="captured-panel">
        <div class="captured-row">
            <span class="captured-label">⚪ Sen yedin</span>
            <span class="captured-pieces" id="captured-by-white">
                <span class="captured-empty">henüz yok</span>
            </span>
            <span class="captured-balance" id="balance-white">Berabere</span>
        </div>
        <div class="captured-row">
            <span class="captured-label">⚫ Fermat yedi</span>
            <span class="captured-pieces" id="captured-by-black">
                <span class="captured-empty">henüz yok</span>
            </span>
            <span class="captured-balance" id="balance-black">Berabere</span>
        </div>
        <div class="captured-legend">
            <strong>Puan:</strong> Piyon 1 · At/Fil 3 · Kale 5 · Vezir 9
        </div>
    </div>
    <div class="btns">
        <button class="btn" id="undo-btn">↶ Geri</button>
        <button class="btn primary" id="new-btn">🔄 Yeni Oyun</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>
// ════════════════════════════════════════════════════════════
// FermatAI Satranç — Stockfish 11 (~3000 ELO) + Minimax fallback
// ════════════════════════════════════════════════════════════

const game = new Chess();
let board = null;
let aiThinking = false;
let useStockfish = false;
let stockfish = null;
let stockfishReady = false;
const STOCKFISH_DEPTH = 20;          // Ultimate — neredeyse yenilmez
const STOCKFISH_MOVETIME = 2500;     // Max 2.5 saniye düşünür
const MINIMAX_DEPTH = 3;             // Fallback — orta seviye

const statusEl = document.getElementById('status');
const enginePill = { textContent: '', style: {} }; // legacy stub (artık DOM'da yok)

function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = 'status-row' + (cls ? ' ' + cls : '');
}

// ─── 25.46+ ESİR TAŞ PANELİ (Neo direktif 18 May) ───
// chess.js history({verbose:true}) → her hamlede 'captured' alanı varsa
// yendi. Her tarafın yediği taşları biriktir, paneli güncelle.
// piece values: p=1, n=3, b=3, r=5, q=9 (standart Reti/Lasker)
const _PIECE_VALUES = { p: 1, n: 3, b: 3, r: 5, q: 9, k: 0 };
// 25.46+ FIX (Neo screenshot 18 May): chessboardjs.com Linux/case-sensitive
// serve ediyor — dosya 'wP.png' (kucuk w + buyuk P), eski kodum 'WP.png'
// uretiyordu → 404. Board chessboardjs lib uzerinden yukluyor bug yoktu,
// benim direkt <img> taglarim broken cikariyor.
function _pieceImgUrl(color, pieceType) {
    return 'https://chessboardjs.com/img/chesspieces/wikipedia/'
         + color.toLowerCase() + pieceType.toUpperCase() + '.png';
}
// Unicode chess glyph fallback — CDN duser ise veya yavas yuklenirse.
// Black-filled glyphler (en gorunur). Renk CSS ile tinted: beyaz tas
// (Fermat yedi) -> beyaz tint, siyah tas (sen yedin) -> slate-300 tint.
const _UNICODE_GLYPH = { p: '♟', n: '♞', b: '♝', r: '♜', q: '♛', k: '♚' };
function updateCaptured() {
    const hist = game.history({ verbose: true });
    // capturedByWhite: beyaz oynadi, siyah tas yedi → kaybeden siyah
    const capturedByWhite = []; // listede 'b' renkli taşlar olur
    const capturedByBlack = []; // 'w' renkli taşlar
    for (const m of hist) {
        if (!m.captured) continue;
        // m.color = yiyen, m.captured = yenen piece türü (kucuk harf)
        // En passant: kaybeden taş türü 'p', renk yiyene karşıt
        if (m.color === 'w') capturedByWhite.push({ type: m.captured, color: 'b' });
        else capturedByBlack.push({ type: m.captured, color: 'w' });
    }
    _renderCapturedRow('captured-by-white', capturedByWhite);
    _renderCapturedRow('captured-by-black', capturedByBlack);
    // Material balance hesabi
    const valW = capturedByWhite.reduce((s, p) => s + (_PIECE_VALUES[p.type] || 0), 0);
    const valB = capturedByBlack.reduce((s, p) => s + (_PIECE_VALUES[p.type] || 0), 0);
    _renderBalance('balance-white', valW, valB);
    _renderBalance('balance-black', valB, valW);
}
function _renderCapturedRow(elId, list) {
    const el = document.getElementById(elId);
    if (!el) return;
    if (!list.length) {
        el.innerHTML = '<span class="captured-empty">henüz yok</span>';
        return;
    }
    // En değerli taş önce → daha mantıklı görsel düzen
    const order = { q:5, r:4, b:3, n:2, p:1 };
    list.sort((a, b) => (order[b.type] || 0) - (order[a.type] || 0));
    // img + onerror Unicode glyph fallback (CDN duserse de calisir)
    el.innerHTML = list.map(p => {
        const url = _pieceImgUrl(p.color, p.type);
        const glyph = _UNICODE_GLYPH[p.type] || '?';
        const colorClass = p.color === 'w' ? 'glyph-w' : 'glyph-b';
        return `<img src="${url}" alt="${p.type}" loading="lazy" `
             + `onerror="this.outerHTML='<span class=&quot;captured-glyph ${colorClass}&quot;>${glyph}</span>'">`;
    }).join('');
}
function _renderBalance(elId, ownVal, oppVal) {
    const el = document.getElementById(elId);
    if (!el) return;
    const diff = ownVal - oppVal;
    // Satranç standartında her taşın değeri var:
    //   Piyon=1, At/Fil=3, Kale=5, Vezir=9
    // Bu değerlere göre "material balance" hesaplanır.
    // Pill metni avam oyuncuya direkt anlamlı: "+4 üstün" / "3 geride" / "Berabere"
    const _TOOLTIP = 'Satranç puanlama — Piyon: 1, At: 3, Fil: 3, Kale: 5, Vezir: 9. '
                   + 'Üstün: karşıdan daha değerli taş kazandın.';
    if (diff > 0) {
        el.textContent = '+' + diff + ' üstün';
        el.className = 'captured-balance lead';
        el.title = _TOOLTIP + ' Şu an ' + diff + ' puan değerinde fazla taş kazandın.';
    } else if (diff < 0) {
        el.textContent = (-diff) + ' geride';
        el.className = 'captured-balance behind';
        el.title = _TOOLTIP + ' Şu an ' + (-diff) + ' puan değerinde fazla taş kaybettin.';
    } else {
        el.textContent = 'Berabere';
        el.className = 'captured-balance';
        el.title = _TOOLTIP + ' İki taraf da eşit değerde taş kazandı.';
    }
}

// ─── STOCKFISH (PRIMARY, ~3000 ELO) — ASYNC LOAD ───
// 25.46+ (Neo screenshot 17 May): 8sn timeout yetersiz, mobile'da 15-25sn lazim.
// Yeni mantik: minimax HEMEN aktif (kullanici beklemez), Stockfish hazir olunca
// arka planda seamless gecis (engine pill ULTIMATE'a donusur).
function initStockfish() {
    // Minimax'i hemen baslat (kullanici hamle yapabilsin)
    enginePill.textContent = 'YÜKLENİYOR';
    setStatus('Hamleni yap ⚪ (motor arka planda hazırlanıyor)', '');

    try {
        console.log('[FermatAI] Stockfish init basliyor...');
        stockfish = new Worker('/static/games/lib/stockfish.js');
        stockfish.onmessage = function(e) {
            const line = (typeof e.data === 'string') ? e.data : '';
            if (line === 'uciok') {
                console.log('[FermatAI] Stockfish uci OK');
                stockfish.postMessage('setoption name Skill Level value 20');
                stockfish.postMessage('isready');
            } else if (line === 'readyok') {
                console.log('[FermatAI] Stockfish READY — Ultimate aktif');
                stockfishReady = true;
                useStockfish = true;
                enginePill.textContent = 'ULTIMATE 3000+';
                enginePill.style.background = 'rgba(16,185,129,0.15)';
                enginePill.style.color = '#10B981';
                enginePill.style.borderColor = 'rgba(16,185,129,0.4)';
                if (!aiThinking && game.turn() === 'w' && !game.game_over()) {
                    setStatus('Hamleni yap ⚪ — ULTIMATE motor hazır 🔥', '');
                }
            } else if (line.startsWith('bestmove')) {
                const move = line.split(' ')[1];
                handleAIMove(move);
            }
        };
        stockfish.onerror = function(err) {
            console.error('[FermatAI] Stockfish ERROR:', err);
            stockfishFallback();
        };
        stockfish.postMessage('uci');
        // 30 saniye içinde hazır olmazsa fallback (mobile 3G icin)
        setTimeout(() => {
            if (!stockfishReady) {
                console.warn('[FermatAI] Stockfish 30sn timeout, GÜÇLÜ modda devam');
                stockfishFallback();
            }
        }, 30000);
    } catch (err) {
        console.error('[FermatAI] Stockfish init exception:', err);
        stockfishFallback();
    }
}

function stockfishFallback() {
    if (useStockfish && stockfishReady) return;
    useStockfish = false;
    enginePill.textContent = 'GÜÇLÜ';
    if (game.turn() === 'w' && !game.game_over() && !aiThinking) {
        setStatus('Hamleni yap ⚪', '');
    }
}

// ─── MINIMAX (FALLBACK ~1700 ELO) ───
const PIECE_VALUES = { p:100, n:320, b:330, r:500, q:900, k:20000 };
const PAWN_TABLE = [
    [0,0,0,0,0,0,0,0],[50,50,50,50,50,50,50,50],[10,10,20,30,30,20,10,10],
    [5,5,10,25,25,10,5,5],[0,0,0,20,20,0,0,0],[5,-5,-10,0,0,-10,-5,5],
    [5,10,10,-20,-20,10,10,5],[0,0,0,0,0,0,0,0]
];
const KNIGHT_TABLE = [
    [-50,-40,-30,-30,-30,-30,-40,-50],[-40,-20,0,0,0,0,-20,-40],
    [-30,0,10,15,15,10,0,-30],[-30,5,15,20,20,15,5,-30],
    [-30,0,15,20,20,15,0,-30],[-30,5,10,15,15,10,5,-30],
    [-40,-20,0,5,5,0,-20,-40],[-50,-40,-30,-30,-30,-30,-40,-50]
];

function getPieceValue(piece, x, y) {
    if (!piece) return 0;
    let val = PIECE_VALUES[piece.type] || 0;
    const row = piece.color === 'w' ? 7 - y : y;
    const col = piece.color === 'w' ? x : 7 - x;
    if (piece.type === 'p') val += PAWN_TABLE[row][col];
    else if (piece.type === 'n') val += KNIGHT_TABLE[row][col];
    return piece.color === 'w' ? val : -val;
}

function evaluateBoard(boardArr) {
    let total = 0;
    for (let y = 0; y < 8; y++)
        for (let x = 0; x < 8; x++)
            total += getPieceValue(boardArr[y][x], x, y);
    return total;
}

function minimax(game, depth, alpha, beta, isMax) {
    if (depth === 0 || game.game_over()) return -evaluateBoard(game.board());
    const moves = game.moves();
    if (isMax) {
        let best = -Infinity;
        for (const m of moves) {
            game.move(m);
            best = Math.max(best, minimax(game, depth-1, alpha, beta, false));
            game.undo();
            alpha = Math.max(alpha, best);
            if (beta <= alpha) break;
        }
        return best;
    } else {
        let best = Infinity;
        for (const m of moves) {
            game.move(m);
            best = Math.min(best, minimax(game, depth-1, alpha, beta, true));
            game.undo();
            beta = Math.min(beta, best);
            if (beta <= alpha) break;
        }
        return best;
    }
}

function findBestMoveMinimax() {
    const moves = game.moves();
    if (!moves.length) return null;
    moves.sort(() => Math.random() - 0.5);
    let best = moves[0], score = -Infinity;
    for (const m of moves) {
        game.move(m);
        const s = minimax(game, MINIMAX_DEPTH - 1, -Infinity, Infinity, false);
        game.undo();
        if (s > score) { score = s; best = m; }
    }
    return best;
}

// ─── AI HAMLE ORKESTRASYONU ───
function aiTurn() {
    if (game.game_over() || aiThinking) return;
    aiThinking = true;
    setStatus('FermatAI düşünüyor 🧠', 'thinking');

    // Stockfish hazırsa onu kullan, değilse minimax (kullanıcı bekletme yok)
    if (stockfishReady && stockfish) {
        stockfish.postMessage('position fen ' + game.fen());
        stockfish.postMessage('go depth ' + STOCKFISH_DEPTH + ' movetime ' + STOCKFISH_MOVETIME);
    } else {
        setTimeout(() => {
            try {
                const m = findBestMoveMinimax();
                handleAIMove(m, true);
            } catch (e) {
                console.error('Minimax hata:', e);
                aiThinking = false;
            }
        }, 200);
    }
}

function handleAIMove(uciOrMove, isMinimax) {
    aiThinking = false;
    if (!uciOrMove || uciOrMove === '(none)') {
        checkEnd();
        return;
    }
    try {
        if (isMinimax) {
            game.move(uciOrMove);
        } else {
            // UCI format e2e4 or e7e8q
            const from = uciOrMove.slice(0, 2);
            const to = uciOrMove.slice(2, 4);
            const promo = uciOrMove.length > 4 ? uciOrMove[4] : undefined;
            game.move({ from, to, promotion: promo });
        }
        board.position(game.fen(), true);
        updateCaptured(); // 25.46+ esir tas paneli
    } catch (e) {
        console.error('Move apply hata:', e);
    }
    checkEnd();
    if (!game.game_over()) setStatus('Sıra sende ⚪', '');
}

function checkEnd() {
    if (game.in_checkmate()) {
        const winner = game.turn() === 'w' ? 'FermatAI' : 'Sen';
        if (winner === 'Sen') {
            setStatus('🏆 KAZANDIN! İnanılmaz!', 'win');
            celebrate();
        } else {
            setStatus('♛ Mat — FermatAI kazandı', 'lose');
        }
    } else if (game.in_draw() || game.in_stalemate()) {
        setStatus('🤝 Berabere', '');
    } else if (game.in_check()) {
        setStatus(game.turn() === 'w' ? '⚠️ Şah!' : 'FermatAI şahta', game.turn() === 'w' ? 'thinking' : '');
    }
}

function celebrate() {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:9999;';
    document.body.appendChild(overlay);
    for (let i = 0; i < 60; i++) {
        const dot = document.createElement('div');
        dot.style.cssText = `position:absolute;width:10px;height:10px;background:#F59E0B;border-radius:50%;left:${Math.random()*100}%;top:-20px;animation:fall ${1+Math.random()*2}s linear forwards;`;
        overlay.appendChild(dot);
    }
    setTimeout(() => overlay.remove(), 4000);
}
const fs = document.createElement('style');
fs.textContent = '@keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }';
document.head.appendChild(fs);

// ─── CHESSBOARD HANDLERS ───
function onDragStart(source, piece) {
    if (game.game_over() || aiThinking) return false;
    if (piece.search(/^b/) !== -1) return false;
    if (game.turn() !== 'w') return false;
}
function onDrop(source, target) {
    const m = game.move({ from: source, to: target, promotion: 'q' });
    if (m === null) return 'snapback';
    updateCaptured(); // 25.46+ esir tas paneli — kullanici hamlesi sonrasi anlik
    setTimeout(aiTurn, 250);
    checkEnd();
}
function onSnapEnd() { board.position(game.fen()); }

document.getElementById('undo-btn').addEventListener('click', () => {
    if (aiThinking) return;
    if (game.history().length >= 2) {
        game.undo(); game.undo();
        board.position(game.fen());
        updateCaptured(); // 25.46+ esir tas paneli — geri alma sonrasi
        setStatus('Geri alındı — hamleni yap ⚪', '');
    }
});

document.getElementById('new-btn').addEventListener('click', () => {
    game.reset();
    board.position('start');
    aiThinking = false;
    updateCaptured(); // 25.46+ esir tas paneli — sifirlama
    if (useStockfish && stockfishReady) {
        stockfish.postMessage('ucinewgame');
        stockfish.postMessage('isready');
    }
    setStatus('Hamleni yap ⚪', '');
});

window.addEventListener('DOMContentLoaded', () => {
    // 25.46+ (Neo): URL ?name=Ali → fighter ismi (ilk ad sadece, KVKK)
    try {
        const params = new URLSearchParams(window.location.search);
        const nm = params.get('name');
        if (nm) {
            const first = nm.trim().split(/\s+/)[0].toUpperCase();
            if (first && first.length < 12) {
                document.getElementById('player-name').textContent = first;
            }
        }
    } catch(e) {}
    board = Chessboard('board', {
        position: 'start',
        draggable: true,
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd,
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
    });
    window.addEventListener('resize', () => board.resize());
    initStockfish();
});
</script>
