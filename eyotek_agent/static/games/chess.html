<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FermatAI Satranç</title>
<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
    background: #0F172A;
    color: #E2E8F0;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    overflow: hidden;
}
.wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    height: 100vh;
}
.bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    background: #1E293B;
    border-radius: 8px;
    font-size: 12px;
    border: 1px solid #334155;
}
.brand { color: #F59E0B; font-weight: 800; letter-spacing: 0.3px; }
.status { color: #CBD5E1; font-weight: 500; }
.status.thinking { color: #F59E0B; }
.status.win { color: #10B981; }
.status.lose { color: #EF4444; }
#board {
    width: 100% !important;
    flex: 1;
    border-radius: 8px;
    overflow: hidden;
}
.btns { display: flex; gap: 6px; }
.btn {
    flex: 1;
    padding: 8px;
    border: 1px solid #334155;
    background: #1E293B;
    color: #E2E8F0;
    font-size: 12px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    -webkit-appearance: none;
}
.btn:active { transform: scale(0.96); background: #334155; }
.btn.primary {
    background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
    color: #0F172A;
    border-color: transparent;
}
.white-1e1d7 { background: #F8FAFC !important; }
.black-3c85d { background: #475569 !important; }
.highlight-square { box-shadow: inset 0 0 0 3px rgba(245,158,11,0.7) !important; }
</style>
</head>
<body>
<div class="wrap">
    <div class="bar">
        <span class="brand">⚡ FermatAI ♟️</span>
        <span class="status" id="status">Hamleni yap ⚪</span>
    </div>
    <div id="board"></div>
    <div class="btns">
        <button class="btn" id="undo-btn">↶ Geri</button>
        <button class="btn primary" id="new-btn">🔄 Yeni Oyun</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>
// ════════════════════════════════════════════════════════════
// FermatAI Satranç — Inline Minimax AI (NO external deps, %100 calisir)
// ════════════════════════════════════════════════════════════

const game = new Chess();
let board = null;
let aiThinking = false;
const AI_DEPTH = 3;  // 3 = makul (~1500-1700 ELO), 4 = guclu ama yavas

const statusEl = document.getElementById('status');

// ─── PIECE-SQUARE TABLES (basic positional evaluation) ───
const PIECE_VALUES = { p: 100, n: 320, b: 330, r: 500, q: 900, k: 20000 };
const PAWN_TABLE = [
    [0,0,0,0,0,0,0,0],
    [50,50,50,50,50,50,50,50],
    [10,10,20,30,30,20,10,10],
    [5,5,10,25,25,10,5,5],
    [0,0,0,20,20,0,0,0],
    [5,-5,-10,0,0,-10,-5,5],
    [5,10,10,-20,-20,10,10,5],
    [0,0,0,0,0,0,0,0]
];
const KNIGHT_TABLE = [
    [-50,-40,-30,-30,-30,-30,-40,-50],
    [-40,-20,0,0,0,0,-20,-40],
    [-30,0,10,15,15,10,0,-30],
    [-30,5,15,20,20,15,5,-30],
    [-30,0,15,20,20,15,0,-30],
    [-30,5,10,15,15,10,5,-30],
    [-40,-20,0,5,5,0,-20,-40],
    [-50,-40,-30,-30,-30,-30,-40,-50]
];
const BISHOP_TABLE = [
    [-20,-10,-10,-10,-10,-10,-10,-20],
    [-10,0,0,0,0,0,0,-10],
    [-10,0,5,10,10,5,0,-10],
    [-10,5,5,10,10,5,5,-10],
    [-10,0,10,10,10,10,0,-10],
    [-10,10,10,10,10,10,10,-10],
    [-10,5,0,0,0,0,5,-10],
    [-20,-10,-10,-10,-10,-10,-10,-20]
];

function getPieceValue(piece, x, y) {
    if (!piece) return 0;
    const baseVal = PIECE_VALUES[piece.type] || 0;
    let posBonus = 0;
    const row = piece.color === 'w' ? 7 - y : y;
    const col = piece.color === 'w' ? x : 7 - x;
    if (piece.type === 'p') posBonus = PAWN_TABLE[row][col];
    else if (piece.type === 'n') posBonus = KNIGHT_TABLE[row][col];
    else if (piece.type === 'b') posBonus = BISHOP_TABLE[row][col];
    const sign = piece.color === 'w' ? 1 : -1;
    return sign * (baseVal + posBonus);
}

function evaluateBoard(boardArr) {
    let total = 0;
    for (let y = 0; y < 8; y++) {
        for (let x = 0; x < 8; x++) {
            total += getPieceValue(boardArr[y][x], x, y);
        }
    }
    return total;
}

// Alpha-beta minimax — AI = BLACK (minimizing player when score = white perspective)
function minimax(game, depth, alpha, beta, isMaximizing) {
    if (depth === 0 || game.game_over()) {
        return -evaluateBoard(game.board()); // AI is black, wants negative score
    }
    const moves = game.ugly_moves ? game.ugly_moves() : game.moves();

    if (isMaximizing) {
        let best = -Infinity;
        for (const move of moves) {
            game.move(move);
            const score = minimax(game, depth - 1, alpha, beta, false);
            game.undo();
            if (score > best) best = score;
            alpha = Math.max(alpha, best);
            if (beta <= alpha) break;
        }
        return best;
    } else {
        let best = Infinity;
        for (const move of moves) {
            game.move(move);
            const score = minimax(game, depth - 1, alpha, beta, true);
            game.undo();
            if (score < best) best = score;
            beta = Math.min(beta, best);
            if (beta <= alpha) break;
        }
        return best;
    }
}

function findBestMove() {
    const moves = game.moves();
    if (moves.length === 0) return null;
    // Shuffle for variety on equal scores
    moves.sort(() => Math.random() - 0.5);
    let bestMove = moves[0];
    let bestScore = -Infinity;
    for (const move of moves) {
        game.move(move);
        const score = minimax(game, AI_DEPTH - 1, -Infinity, Infinity, false);
        game.undo();
        if (score > bestScore) {
            bestScore = score;
            bestMove = move;
        }
    }
    return bestMove;
}

function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = 'status' + (cls ? ' ' + cls : '');
}

function aiTurn() {
    if (game.game_over() || aiThinking) return;
    aiThinking = true;
    setStatus('FermatAI düşünüyor 🧠', 'thinking');
    // Async via setTimeout (UI freeze etmesin)
    setTimeout(() => {
        try {
            const move = findBestMove();
            if (move) {
                game.move(move);
                board.position(game.fen(), true);
            }
            checkEnd();
            if (!game.game_over()) setStatus('Sıra sende ⚪', '');
        } catch (err) {
            console.error('AI hata:', err);
            setStatus('AI hatası, yeniden başla', 'lose');
        }
        aiThinking = false;
    }, 200);
}

function checkEnd() {
    if (game.in_checkmate()) {
        const winner = game.turn() === 'w' ? 'FermatAI' : 'Sen';
        if (winner === 'Sen') {
            setStatus('🏆 Kazandın!', 'win');
            celebrate();
        } else {
            setStatus('♛ Mat — FermatAI kazandı', 'lose');
        }
    } else if (game.in_draw() || game.in_stalemate()) {
        setStatus('🤝 Berabere', '');
    } else if (game.in_check()) {
        setStatus(game.turn() === 'w' ? '⚠️ Şah!' : 'FermatAI şahta', game.turn() === 'w' ? 'thinking' : '');
    }
}

function celebrate() {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:9999;';
    document.body.appendChild(overlay);
    for (let i = 0; i < 40; i++) {
        const dot = document.createElement('div');
        dot.style.cssText = `position:absolute;width:8px;height:8px;background:#F59E0B;border-radius:50%;left:${Math.random()*100}%;top:-20px;animation:fall ${1+Math.random()*1.5}s linear forwards;`;
        overlay.appendChild(dot);
    }
    setTimeout(() => overlay.remove(), 3000);
}

const fallStyle = document.createElement('style');
fallStyle.textContent = '@keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }';
document.head.appendChild(fallStyle);

// Chessboard handlers
function onDragStart(source, piece) {
    if (game.game_over() || aiThinking) return false;
    if (piece.search(/^b/) !== -1) return false;
    if (game.turn() !== 'w') return false;
}

function onDrop(source, target) {
    const move = game.move({ from: source, to: target, promotion: 'q' });
    if (move === null) return 'snapback';
    setTimeout(aiTurn, 250);
    checkEnd();
}

function onSnapEnd() {
    board.position(game.fen());
}

document.getElementById('undo-btn').addEventListener('click', () => {
    if (aiThinking) return;
    if (game.history().length >= 2) {
        game.undo();
        game.undo();
        board.position(game.fen());
        setStatus('Geri alındı — hamleni yap ⚪', '');
    }
});

document.getElementById('new-btn').addEventListener('click', () => {
    game.reset();
    board.position('start');
    aiThinking = false;
    setStatus('Hamleni yap ⚪', '');
});

window.addEventListener('DOMContentLoaded', () => {
    board = Chessboard('board', {
        position: 'start',
        draggable: true,
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd,
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
    });
    window.addEventListener('resize', () => board.resize());
    setStatus('Hamleni yap ⚪', '');
});
</script>
</body>
</html>
