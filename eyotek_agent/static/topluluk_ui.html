<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FermatAI Topluluk</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
    --bg: #0F172A;
    --bg-elev: #1E293B;
    --bg-bubble: #243144;
    --bg-bubble-me: #F59E0B;
    --fg: #E2E8F0;
    --fg-muted: #94A3B8;
    --accent: #F59E0B;
    --border: #334155;
    --green: #10B981;
}
html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Text', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
}
.app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 720px;
    margin: 0 auto;
    background: var(--bg);
}

/* ─── HEADER ─── */
.header {
    flex-shrink: 0;
    background: var(--bg-elev);
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
}
.header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
}
.back-btn {
    background: transparent;
    border: 0;
    color: var(--fg);
    font-size: 22px;
    cursor: pointer;
    padding: 4px 8px;
    margin-left: -8px;
}
.title-block { flex: 1; }
.title {
    font-size: 18px;
    font-weight: 700;
    color: var(--fg);
}
.subtitle {
    font-size: 11px;
    color: var(--fg-muted);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
}
.online-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(16,185,129,0.6);
}
.tabs {
    display: flex;
    margin-top: 12px;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: -10px;
}
.tab {
    background: transparent;
    border: 0;
    color: var(--fg-muted);
    font-size: 14px;
    font-weight: 600;
    padding: 8px 4px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
}
.tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
}

/* ─── MESSAGES ─── */
.messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--fg-muted);
    font-size: 14px;
}
.empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }

.msg {
    display: flex;
    flex-direction: column;
    max-width: 80%;
    gap: 3px;
}
.msg.me { align-self: flex-end; align-items: flex-end; }
.msg-header {
    font-size: 11px;
    color: var(--fg-muted);
    padding: 0 4px;
    display: flex;
    align-items: center;
    gap: 6px;
}
.msg-name { font-weight: 700; color: var(--fg); }
.msg.me .msg-name { color: var(--accent); }
.role-pill {
    background: rgba(245,158,11,0.12);
    color: var(--accent);
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
}
.role-pill.ogrenci { background: rgba(99,102,241,0.15); color: #818CF8; }
.role-pill.ogretmen { background: rgba(245,158,11,0.15); color: var(--accent); }
.role-pill.rehber { background: rgba(168,85,247,0.15); color: #C084FC; }
.role-pill.mudur { background: rgba(239,68,68,0.15); color: #F87171; }
.role-pill.admin { background: rgba(16,185,129,0.15); color: var(--green); }
.msg-time { color: var(--fg-muted); font-size: 10px; }

.bubble {
    background: var(--bg-bubble);
    padding: 9px 13px;
    border-radius: 16px;
    border-top-left-radius: 4px;
    font-size: 14px;
    line-height: 1.4;
    color: var(--fg);
    word-wrap: break-word;
    white-space: pre-wrap;
}
.msg.me .bubble {
    background: var(--bg-bubble-me);
    color: #0F172A;
    border-top-right-radius: 4px;
    border-top-left-radius: 16px;
    font-weight: 500;
}

.reactions {
    display: flex;
    gap: 4px;
    margin-top: 2px;
    padding: 0 4px;
    flex-wrap: wrap;
}
.reaction {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2px 7px;
    font-size: 11px;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
}
.reaction:hover, .reaction.mine { background: rgba(245,158,11,0.15); border-color: var(--accent); }
.reaction-count { color: var(--fg-muted); margin-left: 2px; font-weight: 600; }

/* ─── INPUT ─── */
.input-bar {
    flex-shrink: 0;
    background: var(--bg-elev);
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: flex-end;
}
.input-wrap {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 8px 14px;
    display: flex;
    align-items: center;
}
.input-wrap:focus-within { border-color: var(--accent); }
#msg-input {
    flex: 1;
    background: transparent;
    border: 0;
    outline: 0;
    color: var(--fg);
    font-size: 15px;
    resize: none;
    max-height: 120px;
    font-family: inherit;
}
#msg-input::placeholder { color: var(--fg-muted); }
.send-btn {
    background: var(--accent);
    color: #0F172A;
    border: 0;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
}
.send-btn:active { transform: scale(0.92); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: #DC2626;
    color: white;
    padding: 10px 18px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.success { background: var(--green); }

/* QuitNow-style "Online mısın?" empty */
.offline-block {
    text-align: center;
    padding: 80px 30px;
    color: var(--fg-muted);
}
.offline-block .icon { font-size: 56px; opacity: 0.3; margin-bottom: 14px; }
.offline-block .text { font-size: 15px; font-weight: 500; }
</style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="header-row">
            <button class="back-btn" onclick="history.back()" aria-label="Geri">←</button>
            <div class="title-block">
                <div class="title">Topluluk</div>
                <div class="subtitle">
                    <span class="online-dot"></span>
                    <span id="online-count">Çevrimiçi sayılıyor...</span>
                </div>
            </div>
        </div>
        <div class="tabs">
            <button class="tab active" data-tab="sohbet">Sohbet</button>
            <button class="tab" data-tab="mention" disabled style="opacity:0.5">Mention'lar</button>
            <button class="tab" data-tab="profil" disabled style="opacity:0.5">Profil</button>
        </div>
    </div>

    <div class="messages" id="messages">
        <div class="empty-state" id="empty-state">
            <div class="empty-state-icon">💬</div>
            <div>Mesaj yükleniyor...</div>
        </div>
    </div>

    <div class="input-bar">
        <div class="input-wrap">
            <textarea id="msg-input" placeholder="Mesaj yaz..." rows="1" maxlength="500"></textarea>
        </div>
        <button class="send-btn" id="send-btn" aria-label="Gönder">▲</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════
// FermatAI Topluluk — QuitNow-tarzı sohbet
// ════════════════════════════════════════════════════
const API = '/topluluk';
let myPhone = null;
let lastMessageId = 0;
let pollingInterval = null;
const POLL_MS = 4000;

const messagesEl = document.getElementById('messages');
const emptyStateEl = document.getElementById('empty-state');
const inputEl = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const onlineCountEl = document.getElementById('online-count');
const toastEl = document.getElementById('toast');

function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
}
function formatTime(iso) {
    const d = new Date(iso);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60) return 'şimdi';
    if (diff < 3600) return Math.floor(diff/60) + 'dk';
    if (diff < 86400 && d.getDate() === now.getDate()) {
        return d.toLocaleTimeString('tr-TR', {hour: '2-digit', minute: '2-digit'});
    }
    return d.toLocaleDateString('tr-TR', {day: '2-digit', month: 'short'}) +
           ' ' + d.toLocaleTimeString('tr-TR', {hour: '2-digit', minute: '2-digit'});
}
function showToast(msg, type) {
    toastEl.textContent = msg;
    toastEl.className = 'toast show' + (type === 'success' ? ' success' : '');
    setTimeout(() => toastEl.classList.remove('show'), 3000);
}

function renderMessage(m) {
    const div = document.createElement('div');
    div.className = 'msg' + (m.is_me ? ' me' : '');
    div.dataset.id = m.id;
    const rolePill = m.user_role && m.user_role !== 'ogrenci'
        ? `<span class="role-pill ${escapeHtml(m.user_role)}">${escapeHtml(m.user_role)}</span>`
        : '';
    const headerHtml = m.is_me ? '' : `
        <div class="msg-header">
            <span class="msg-name">${escapeHtml(m.user_name)}</span>
            ${rolePill}
            <span class="msg-time">${formatTime(m.created_at)}</span>
        </div>`;
    const reactionsHtml = m.reactions && Object.keys(m.reactions).length
        ? `<div class="reactions">${Object.entries(m.reactions).map(([emoji, users]) => {
            const mine = myPhone && users.includes(myPhone);
            return `<span class="reaction${mine?' mine':''}" data-emoji="${emoji}" onclick="toggleReact(${m.id}, '${emoji}')">${emoji} <span class="reaction-count">${users.length}</span></span>`;
        }).join('')}</div>`
        : '';
    div.innerHTML = headerHtml + `<div class="bubble">${escapeHtml(m.message)}</div>` + reactionsHtml;
    return div;
}

async function loadMessages() {
    try {
        const res = await fetch(`${API}/messages?limit=50`, {credentials: 'include'});
        if (!res.ok) {
            if (res.status === 401) {
                emptyStateEl.innerHTML = '<div class="offline-block"><div class="icon">🔒</div><div class="text">Önce sohbete giriş yap</div></div>';
                return;
            }
            throw new Error('HTTP ' + res.status);
        }
        const data = await res.json();
        onlineCountEl.textContent = `${data.online_count} çevrimiçi`;
        if (!data.messages.length) {
            emptyStateEl.innerHTML = '<div class="empty-state-icon">💬</div><div>Henüz mesaj yok — ilk yazan sen ol!</div>';
            emptyStateEl.style.display = '';
            return;
        }
        emptyStateEl.style.display = 'none';
        // Yeni mesaj kontrolü
        const newMessages = data.messages.filter(m => m.id > lastMessageId);
        if (lastMessageId === 0) {
            // İlk yükleme: hepsini bas
            messagesEl.innerHTML = '';
            data.messages.forEach(m => {
                messagesEl.appendChild(renderMessage(m));
                if (m.is_me) myPhone = 'me_marker';
            });
            scrollToBottom();
        } else {
            // Sadece yenileri ekle
            newMessages.forEach(m => messagesEl.appendChild(renderMessage(m)));
            if (newMessages.length) scrollToBottom();
        }
        if (data.messages.length) {
            lastMessageId = Math.max(...data.messages.map(m => m.id));
        }
    } catch (err) {
        console.error('Mesaj yükleme hatası:', err);
    }
}

function scrollToBottom() {
    requestAnimationFrame(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
    });
}

async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;
    sendBtn.disabled = true;
    try {
        const res = await fetch(`${API}/send`, {
            method: 'POST',
            credentials: 'include',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: text})
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({detail: 'Bilinmeyen hata'}));
            showToast(err.detail || 'Mesaj gönderilemedi');
            return;
        }
        inputEl.value = '';
        autoResize();
        await loadMessages();
    } catch (err) {
        showToast('Bağlantı hatası');
    } finally {
        sendBtn.disabled = false;
        inputEl.focus();
    }
}

async function toggleReact(messageId, emoji) {
    try {
        const res = await fetch(`${API}/react`, {
            method: 'POST',
            credentials: 'include',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message_id: messageId, emoji})
        });
        if (res.ok) await loadMessages();
    } catch (err) {
        console.error('Reaction error:', err);
    }
}
window.toggleReact = toggleReact;

function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
}

inputEl.addEventListener('input', autoResize);
inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !navigator.userAgent.match(/iPhone|iPad|Android/i)) {
        e.preventDefault();
        sendMessage();
    }
});
sendBtn.addEventListener('click', sendMessage);

// Initial load + polling
loadMessages();
pollingInterval = setInterval(loadMessages, POLL_MS);

// Page hidden iken polling durdur
document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
        clearInterval(pollingInterval);
    } else {
        loadMessages();
        pollingInterval = setInterval(loadMessages, POLL_MS);
    }
});
</script>
</body>
</html>
