<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Topluluk · FermatAI</title>
<!-- No-FOUC: tema bayraqi (chat ile birebir ayni key: fermat_theme) -->
<script>
(function(){
  try {
    var t = localStorage.getItem('fermat_theme');
    if (t !== 'light' && t !== 'dark') {
      t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', t);
  } catch(e) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; }

/* ─── Chat ile BIREBIR ayni palet ─── */
:root {
  /* Claude.ai palette — sade, sicak, rahat (LIGHT) */
  --bg: #F5F4ED;
  --panel: #FAFAF7;
  --fg: #2F2F2F;
  --fg-muted: #6B6B6B;
  --accent: #C76F3E;
  --accent-hover: #B05A2B;
  --user-bubble: #D97757;
  --bot-bubble: #FFFFFF;
  --border: #E7E5DE;
  --input-bg: #FFFFFF;
  --error: #B24F3A;
}
html[data-theme="dark"] {
  --bg: #1F1F1C;
  --panel: #262622;
  --fg: #E8E6E0;
  --fg-muted: #9A9A93;
  --accent: #D97757;
  --accent-hover: #E88E70;
  --user-bubble: #8B4A30;
  --bot-bubble: #2F2F2B;
  --border: #3A3A35;
  --input-bg: #2A2A26;
  --error: #E07858;
}

html, body {
  height: 100vh; height: 100dvh;
  background: var(--bg); color: var(--fg);
  font-size: 15px; overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
.app {
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  max-width: 760px; margin: 0 auto;
  background: var(--bg);
}

/* ─── HEADER (chat tarzı) ─── */
.header {
  flex-shrink: 0;
  background: var(--panel);
  padding: 12px 16px 8px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.header-row {
  display: flex; align-items: center;
  justify-content: space-between; gap: 10px;
}
.back-btn {
  background: transparent; border: 0;
  color: var(--fg); font-size: 22px;
  cursor: pointer; padding: 4px 8px; margin-left: -8px;
  border-radius: 8px;
}
.back-btn:hover { background: var(--bg); }
.title-block { flex: 1; min-width: 0; }
.title {
  font-size: 18px; font-weight: 700; color: var(--fg);
  letter-spacing: -0.2px;
}
.subtitle {
  font-size: 12px; color: var(--fg-muted);
  margin-top: 2px; display: flex; align-items: center; gap: 6px;
}
.online-dot {
  display: inline-block; width: 8px; height: 8px;
  background: #10B981; border-radius: 50%;
  box-shadow: 0 0 6px rgba(16,185,129,0.45);
}
.theme-toggle {
  background: linear-gradient(135deg, rgba(199,111,62,0.10), rgba(167,139,250,0.10));
  border: 1px solid rgba(199,111,62,0.25);
  color: var(--accent);
  font-size: 14px; cursor: pointer;
  padding: 5px 10px; border-radius: 18px;
  transition: all 0.2s; font-weight: 600;
}
.theme-toggle:hover {
  background: linear-gradient(135deg, rgba(199,111,62,0.20), rgba(167,139,250,0.20));
  transform: translateY(-1px);
}
html[data-theme="dark"] .theme-toggle {
  background: linear-gradient(135deg, rgba(199,111,62,0.18), rgba(167,139,250,0.15));
  border-color: rgba(199,111,62,0.35);
}

.tabs {
  display: flex; margin-top: 10px;
  gap: 16px; border-bottom: 1px solid var(--border);
  margin-bottom: -8px;
}
.tab {
  background: transparent; border: 0;
  color: var(--fg-muted);
  font-size: 14px; font-weight: 600;
  padding: 8px 4px; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab[disabled] { opacity: 0.4; cursor: not-allowed; }

/* ─── MESSAGES ─── */
.messages {
  flex: 1; overflow-y: auto;
  padding: 16px 12px 20px;
  display: flex; flex-direction: column; gap: 12px;
  -webkit-overflow-scrolling: touch;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.empty-state {
  text-align: center; padding: 60px 30px;
  color: var(--fg-muted); font-size: 14px;
}
.empty-state-icon { font-size: 52px; margin-bottom: 14px; opacity: 0.35; }

.msg {
  display: flex; flex-direction: column;
  max-width: 78%; gap: 4px;
}
.msg.me { align-self: flex-end; align-items: flex-end; }

.msg-header {
  font-size: 11.5px; color: var(--fg-muted);
  padding: 0 6px; display: flex; align-items: center; gap: 6px;
}
.msg-name { font-weight: 700; color: var(--fg); }
.role-pill {
  background: rgba(199,111,62,0.12); color: var(--accent);
  padding: 1px 7px; border-radius: 10px;
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.4px;
  border: 1px solid rgba(199,111,62,0.2);
}
.role-pill.ogrenci { background: rgba(99,102,241,0.12); color: #6366F1; border-color: rgba(99,102,241,0.2); }
.role-pill.ogretmen, .role-pill.rehber { background: rgba(199,111,62,0.12); color: var(--accent); }
.role-pill.mudur { background: rgba(239,68,68,0.12); color: #DC2626; border-color: rgba(239,68,68,0.2); }
.role-pill.admin { background: rgba(16,185,129,0.12); color: #059669; border-color: rgba(16,185,129,0.2); }
html[data-theme="dark"] .role-pill.ogrenci { color: #818CF8; }
html[data-theme="dark"] .role-pill.mudur { color: #F87171; }
html[data-theme="dark"] .role-pill.admin { color: #34D399; }
.msg-time { color: var(--fg-muted); font-size: 10.5px; }

.bubble {
  background: var(--bot-bubble);
  border: 1px solid var(--border);
  padding: 10px 14px;
  border-radius: 16px;
  border-top-left-radius: 4px;
  font-size: 14.5px; line-height: 1.45;
  color: var(--fg);
  word-wrap: break-word; white-space: pre-wrap;
  box-shadow: 0 1px 2px rgba(0,0,0,0.03);
}
.msg.me .bubble {
  background: var(--user-bubble);
  border-color: var(--user-bubble);
  color: #FFFFFF;
  border-top-right-radius: 4px;
  border-top-left-radius: 16px;
}

.reactions {
  display: flex; gap: 4px; margin-top: 3px;
  padding: 0 6px; flex-wrap: wrap;
}
.reaction {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2px 8px;
  font-size: 11.5px; cursor: pointer;
  user-select: none; transition: all 0.15s;
}
.reaction:hover, .reaction.mine {
  background: rgba(199,111,62,0.10);
  border-color: var(--accent);
}
.reaction-count { color: var(--fg-muted); margin-left: 3px; font-weight: 600; font-size: 10.5px; }

/* ─── INPUT ─── */
.input-bar {
  flex-shrink: 0;
  background: var(--panel);
  padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: flex-end;
}
.input-wrap {
  flex: 1;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 10px 16px;
  display: flex; align-items: center;
  transition: border-color 0.15s;
}
.input-wrap:focus-within { border-color: var(--accent); }
#msg-input {
  flex: 1; background: transparent; border: 0; outline: 0;
  color: var(--fg); font-size: 15px;
  resize: none; max-height: 120px;
  font-family: inherit; line-height: 1.4;
}
#msg-input::placeholder { color: var(--fg-muted); }
.send-btn {
  background: var(--accent); color: #FFFFFF;
  border: 0; border-radius: 50%;
  width: 42px; height: 42px;
  font-size: 18px; cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  box-shadow: 0 2px 8px rgba(199,111,62,0.25);
}
.send-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
.send-btn:active { transform: scale(0.94); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.toast {
  position: fixed; bottom: 86px; left: 50%;
  transform: translateX(-50%);
  background: var(--error); color: #FFFFFF;
  padding: 10px 18px; border-radius: 24px;
  font-size: 13px; font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  z-index: 100; opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
  max-width: 90%; text-align: center;
}
.toast.show { opacity: 1; }
.toast.success { background: #10B981; }

/* ─── PROFIL TAB (25.46+ nickname) ─── */
.profile-pane {
  flex: 1; overflow-y: auto;
  padding: 16px 12px 24px;
  -webkit-overflow-scrolling: touch;
}
.profile-card {
  max-width: 480px; margin: 0 auto;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  display: flex; flex-direction: column; gap: 18px;
}
.profile-avatar {
  align-self: center;
  width: 72px; height: 72px;
  background: linear-gradient(135deg, var(--accent), var(--accent-hover));
  color: #FFFFFF; font-size: 30px; font-weight: 800;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(199,111,62,0.3);
  text-transform: uppercase;
}
.profile-label {
  font-size: 11px; color: var(--fg-muted);
  text-transform: uppercase; letter-spacing: 0.5px;
  font-weight: 600; margin-bottom: 5px;
}
.profile-real-section,
.profile-display-section {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
}
.profile-real-name {
  font-size: 15px; font-weight: 600; color: var(--fg);
}
.profile-display-name {
  font-size: 17px; font-weight: 700; color: var(--accent);
}
.profile-hint {
  font-size: 11px; color: var(--fg-muted); margin-top: 4px;
}
.profile-form { display: flex; flex-direction: column; gap: 8px; }
#nick-input {
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 15px; color: var(--fg);
  outline: 0; font-family: inherit;
  transition: border-color 0.15s;
}
#nick-input:focus { border-color: var(--accent); }
.profile-rules {
  font-size: 10.5px; color: var(--fg-muted);
  line-height: 1.45; padding: 0 2px;
}
.profile-actions {
  display: flex; gap: 8px; margin-top: 4px;
}
.btn-primary, .btn-secondary {
  flex: 1; padding: 11px;
  border: 0; border-radius: 10px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.btn-primary {
  background: var(--accent); color: #FFFFFF;
  box-shadow: 0 2px 8px rgba(199,111,62,0.25);
}
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-secondary {
  background: transparent; color: var(--fg-muted);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--bg); color: var(--fg); }
.profile-cooldown {
  font-size: 11px; color: #EF4444;
  text-align: center; min-height: 14px; font-weight: 500;
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-row">
      <button class="back-btn" onclick="goBack()" aria-label="Geri">←</button>
      <div class="title-block">
        <div class="title">Topluluk</div>
        <div class="subtitle">
          <span class="online-dot"></span>
          <span id="online-count">Yükleniyor...</span>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Tema değiştir">🌙</button>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="sohbet" onclick="switchTab('sohbet')">Sohbet</button>
      <button class="tab" data-tab="mention" disabled>Mention'lar</button>
      <button class="tab" data-tab="profil" onclick="switchTab('profil')">Profil</button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-state-icon">💬</div>
      <div>Yükleniyor...</div>
    </div>
  </div>

  <!-- Profil tab içeriği -->
  <div class="profile-pane" id="profile-pane" style="display:none;">
    <div class="profile-card">
      <div class="profile-avatar" id="profile-avatar">?</div>
      <div class="profile-real-section">
        <div class="profile-label">Gerçek Adın (sadece sen görürsün)</div>
        <div class="profile-real-name" id="profile-real-name">—</div>
      </div>
      <div class="profile-display-section">
        <div class="profile-label">Toplulukta nasıl görünüyorsun</div>
        <div class="profile-display-name" id="profile-display-name">—</div>
        <div class="profile-hint" id="profile-hint"></div>
      </div>
      <div class="profile-form">
        <label for="nick-input" class="profile-label">Nickname (kendi adını seç)</label>
        <input type="text" id="nick-input" placeholder="örn: enes_2025, mat_canavari, fizik_pro" maxlength="30" autocomplete="off">
        <div class="profile-rules">
          3-30 karakter · Harf/rakam/_/. · Boşluk yok · Küfür yok · "admin/bot/fermat" rezerve
        </div>
        <div class="profile-actions">
          <button class="btn-secondary" id="nick-reset-btn" onclick="resetNickname()">Varsayılana Dön</button>
          <button class="btn-primary" id="nick-save-btn" onclick="saveNickname()">Kaydet</button>
        </div>
        <div class="profile-cooldown" id="profile-cooldown"></div>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="msg-input" placeholder="Mesajını yaz..." rows="1" maxlength="500"></textarea>
    </div>
    <button class="send-btn" id="send-btn" aria-label="Gönder">▲</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════
// Topluluk — Chat ile birebir tema (fermat_theme)
// ════════════════════════════════════════════════════
const API = '/topluluk';
let lastMessageId = 0;
let pollingInterval = null;
const POLL_MS = 4000;

const messagesEl = document.getElementById('messages');
const emptyStateEl = document.getElementById('empty-state');
const inputEl = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const onlineCountEl = document.getElementById('online-count');
const toastEl = document.getElementById('toast');
const themeToggleEl = document.getElementById('themeToggle');

// ─── TEMA ───
function getTheme() {
  return document.documentElement.getAttribute('data-theme') || 'dark';
}
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  themeToggleEl.textContent = t === 'dark' ? '☀️' : '🌙';
  try { localStorage.setItem('fermat_theme', t); } catch(e) {}
}
function toggleTheme() {
  applyTheme(getTheme() === 'dark' ? 'light' : 'dark');
}
applyTheme(getTheme());
// Storage event — diğer sekmedeki tema değişikliği yansısın (chat ile senkron)
window.addEventListener('storage', (e) => {
  if (e.key === 'fermat_theme' && (e.newValue === 'light' || e.newValue === 'dark')) {
    applyTheme(e.newValue);
  }
});
window.toggleTheme = toggleTheme;

function goBack() {
  // Eger parent (chat overlay) icinde acildiysak — postMessage ile bildir
  if (window.parent !== window) {
    try { window.parent.postMessage('topluluk-close', '*'); return; } catch(e) {}
  }
  // Standalone modda — history veya /chat
  if (window.history.length > 1) history.back();
  else window.location.href = '/chat';
}
window.goBack = goBack;

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
}
function formatTime(iso) {
  const d = new Date(iso); const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'şimdi';
  if (diff < 3600) return Math.floor(diff/60) + 'dk';
  if (diff < 86400 && d.getDate() === now.getDate())
    return d.toLocaleTimeString('tr-TR', {hour: '2-digit', minute: '2-digit'});
  return d.toLocaleDateString('tr-TR', {day: '2-digit', month: 'short'}) +
         ' ' + d.toLocaleTimeString('tr-TR', {hour: '2-digit', minute: '2-digit'});
}
function showToast(msg, type) {
  toastEl.textContent = msg;
  toastEl.className = 'toast show' + (type === 'success' ? ' success' : '');
  setTimeout(() => toastEl.classList.remove('show'), 3000);
}

function renderMessage(m) {
  const div = document.createElement('div');
  div.className = 'msg' + (m.is_me ? ' me' : '');
  div.dataset.id = m.id;
  const rolePill = m.user_role && m.user_role !== 'ogrenci'
    ? `<span class="role-pill ${escapeHtml(m.user_role)}">${escapeHtml(m.user_role)}</span>` : '';
  const headerHtml = m.is_me ? '' : `
    <div class="msg-header">
      <span class="msg-name">${escapeHtml(m.user_name)}</span>
      ${rolePill}
      <span class="msg-time">${formatTime(m.created_at)}</span>
    </div>`;
  const reactionsHtml = m.reactions && Object.keys(m.reactions).length
    ? `<div class="reactions">${Object.entries(m.reactions).map(([emoji, users]) => {
        const mine = m.is_me && users.includes('me_marker'); // basitleştirilmiş
        return `<span class="reaction${mine?' mine':''}" data-emoji="${emoji}" onclick="toggleReact(${m.id}, '${emoji}')">${emoji} <span class="reaction-count">${users.length}</span></span>`;
      }).join('')}</div>` : '';
  div.innerHTML = headerHtml + `<div class="bubble">${escapeHtml(m.message)}</div>` + reactionsHtml;
  return div;
}

async function loadMessages() {
  try {
    const res = await fetch(`${API}/messages?limit=50`, {credentials: 'include'});
    if (!res.ok) {
      if (res.status === 401) {
        emptyStateEl.innerHTML = '<div class="empty-state-icon">🔒</div><div>Önce <a href="/chat" style="color:var(--accent);text-decoration:underline">sohbete giriş yap</a></div>';
        return;
      }
      throw new Error('HTTP ' + res.status);
    }
    const data = await res.json();
    onlineCountEl.textContent = `${data.online_count} çevrimiçi`;
    if (!data.messages.length) {
      emptyStateEl.innerHTML = '<div class="empty-state-icon">💬</div><div>Henüz mesaj yok — ilk yazan sen ol!</div>';
      emptyStateEl.style.display = '';
      return;
    }
    emptyStateEl.style.display = 'none';
    const newMessages = data.messages.filter(m => m.id > lastMessageId);
    if (lastMessageId === 0) {
      messagesEl.innerHTML = '';
      data.messages.forEach(m => messagesEl.appendChild(renderMessage(m)));
      scrollToBottom();
    } else {
      newMessages.forEach(m => messagesEl.appendChild(renderMessage(m)));
      if (newMessages.length) scrollToBottom();
    }
    if (data.messages.length) lastMessageId = Math.max(...data.messages.map(m => m.id));
  } catch (err) {
    console.error('Mesaj yükleme hatası:', err);
  }
}

function scrollToBottom() {
  requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; });
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || sendBtn.disabled) return;
  sendBtn.disabled = true;
  try {
    const res = await fetch(`${API}/send`, {
      method: 'POST', credentials: 'include',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text})
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({detail: 'Bilinmeyen hata'}));
      showToast(err.detail || 'Mesaj gönderilemedi');
      return;
    }
    inputEl.value = ''; autoResize();
    await loadMessages();
  } catch (err) { showToast('Bağlantı hatası'); }
  finally { sendBtn.disabled = false; inputEl.focus(); }
}

async function toggleReact(messageId, emoji) {
  try {
    const res = await fetch(`${API}/react`, {
      method: 'POST', credentials: 'include',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message_id: messageId, emoji})
    });
    if (res.ok) await loadMessages();
  } catch (err) { console.error('React hata:', err); }
}
window.toggleReact = toggleReact;

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
}
inputEl.addEventListener('input', autoResize);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey && !navigator.userAgent.match(/iPhone|iPad|Android/i)) {
    e.preventDefault(); sendMessage();
  }
});
sendBtn.addEventListener('click', sendMessage);

loadMessages();
pollingInterval = setInterval(loadMessages, POLL_MS);
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { clearInterval(pollingInterval); }
  else if (currentTab === 'sohbet') { loadMessages(); pollingInterval = setInterval(loadMessages, POLL_MS); }
});

// ════════════════════════════════════════════════════
// 25.46+ PROFIL TAB (Nickname yönetimi)
// ════════════════════════════════════════════════════
let currentTab = 'sohbet';
let myProfile = null;

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  const messagesEl_ = document.getElementById('messages');
  const inputBar = document.querySelector('.input-bar');
  const profileEl = document.getElementById('profile-pane');
  if (tab === 'profil') {
    messagesEl_.style.display = 'none';
    inputBar.style.display = 'none';
    profileEl.style.display = 'flex';
    profileEl.style.flexDirection = 'column';
    clearInterval(pollingInterval);
    loadProfile();
  } else {
    messagesEl_.style.display = '';
    inputBar.style.display = '';
    profileEl.style.display = 'none';
    loadMessages();
    pollingInterval = setInterval(loadMessages, POLL_MS);
  }
}
window.switchTab = switchTab;

async function loadProfile() {
  try {
    const res = await fetch(`${API}/me`, {credentials: 'include'});
    if (!res.ok) {
      if (res.status === 401) {
        document.getElementById('profile-real-name').textContent = 'Giriş yapmadın';
        return;
      }
      throw new Error('HTTP ' + res.status);
    }
    myProfile = await res.json();
    // Avatar = nickname'in ilk harfi veya real_name first letter
    const initial = (myProfile.nickname || myProfile.real_name_self || '?')[0].toUpperCase();
    document.getElementById('profile-avatar').textContent = initial;
    document.getElementById('profile-real-name').textContent = myProfile.real_name_self || '—';
    document.getElementById('profile-display-name').textContent = myProfile.display_name || '—';
    const hint = myProfile.nickname
      ? `Nickname aktif: "${myProfile.nickname}"`
      : `Otomatik: "${myProfile.real_name_masked}" (KVKK uyumlu masked ad)`;
    document.getElementById('profile-hint').textContent = hint;
    document.getElementById('nick-input').value = myProfile.nickname || '';
    document.getElementById('nick-input').placeholder = myProfile.nickname
      ? 'Yeni nickname...'
      : 'örn: enes_2025, mat_canavari, fizik_pro';

    // Cooldown gösterim
    const cdEl = document.getElementById('profile-cooldown');
    if (myProfile.can_change_at) {
      const tick = () => {
        const diff = Math.max(0, Math.floor((new Date(myProfile.can_change_at) - new Date()) / 1000));
        if (diff > 0) {
          cdEl.textContent = `⏳ ${diff} saniye sonra değiştirebilirsin`;
          document.getElementById('nick-save-btn').disabled = true;
          setTimeout(tick, 1000);
        } else {
          cdEl.textContent = '';
          document.getElementById('nick-save-btn').disabled = false;
        }
      };
      tick();
    } else {
      cdEl.textContent = '';
      document.getElementById('nick-save-btn').disabled = false;
    }
  } catch (err) {
    console.error('Profil yükleme hatası:', err);
    showToast('Profil yüklenemedi');
  }
}

async function saveNickname() {
  const nick = document.getElementById('nick-input').value.trim();
  if (!nick) { showToast('Nickname boş olamaz'); return; }
  const btn = document.getElementById('nick-save-btn');
  btn.disabled = true;
  try {
    const res = await fetch(`${API}/nickname`, {
      method: 'POST', credentials: 'include',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({nickname: nick})
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      showToast(data.detail || 'Kaydedilemedi');
      return;
    }
    showToast(`✓ Nickname kaydedildi: ${data.nickname}`, 'success');
    await loadProfile();
    // Sohbet'e geri dön ki kullanıcı kendi yeni nickname'ini göredekisin
    setTimeout(() => switchTab('sohbet'), 1200);
  } catch (err) {
    showToast('Bağlantı hatası');
  } finally {
    btn.disabled = false;
  }
}
window.saveNickname = saveNickname;

async function resetNickname() {
  if (!confirm('Nickname kaldırılsın mı? "Ad S." formatına döneceksin.')) return;
  try {
    const res = await fetch(`${API}/nickname`, {method: 'DELETE', credentials: 'include'});
    if (!res.ok) { showToast('Kaldırılamadı'); return; }
    const data = await res.json();
    showToast(`✓ Varsayılana döndün: ${data.display_name}`, 'success');
    await loadProfile();
  } catch (err) { showToast('Bağlantı hatası'); }
}
window.resetNickname = resetNickname;
</script>
