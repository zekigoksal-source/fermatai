# FermatAI — Nginx Reverse Proxy + SSL (Let's Encrypt)
# =====================================================
# Dosya: /etc/nginx/sites-available/fermatai
# Symlink: sudo ln -s /etc/nginx/sites-available/fermatai /etc/nginx/sites-enabled/
# Test:    sudo nginx -t
# Reload:  sudo systemctl reload nginx
# SSL:     sudo certbot --nginx -d api.fermategitimkurumlari.com
# =====================================================

# HTTP → HTTPS redirect (Let's Encrypt sonrası otomatik eklenir)
server {
    listen 80;
    listen [::]:80;
    server_name api.fermategitimkurumlari.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Diğer tüm istekler HTTPS'e redirect
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Ana reverse proxy
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.fermategitimkurumlari.com;

    # SSL certificates (certbot tarafından otomatik eklenir)
    ssl_certificate /etc/letsencrypt/live/api.fermategitimkurumlari.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.fermategitimkurumlari.com/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request limits
    client_max_body_size 25M;              # Foto soru (max 25MB)
    client_body_timeout 60s;
    client_header_timeout 30s;

    # Logging
    access_log /var/log/nginx/fermatai-access.log;
    error_log /var/log/nginx/fermatai-error.log warn;

    # Proxy to FastAPI bridge
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts — LLM yavaş cevap verebilir (Claude 22.5s ortalama)
        proxy_connect_timeout 10s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        proxy_buffering off;               # SSE/streaming için
    }

    # Health check endpoint (UptimeRobot için)
    location = /healthz {
        proxy_pass http://127.0.0.1:8001/chat;
        proxy_set_header Host $host;
        access_log off;
    }

    # WhatsApp webhook — Meta tarafından çağrılıyor, aggressive timeout
    location /webhook {
        proxy_pass http://127.0.0.1:8001/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Meta 5 saniyede cevap bekler — hızlı acknowledge
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 30s;
    }
}
